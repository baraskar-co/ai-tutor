<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAI Pro - AI Tutor</title>
    
    <link rel="stylesheet" href="style.css">
    <style>
        /* Isse background page ekdum clean rahega aur focus sirf chat par hoga */
        body {
            background-color: #0f172a; /* Dark sleek theme matching your bot */
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <script src="script.js"></script>

    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/05/28/19/20260528195124-S12PK2SO.js" defer></script>

    <script>
        window.addEventListener('load', () => {
            const launchChat = setInterval(() => {
                if (window.botpress && typeof window.botpress.open === 'function') {
                    window.botpress.open();
                    clearInterval(launchChat); // Loop ko band karne ke liye jaise hi chat open ho
                }
            }, 100); // Har 100ms mein verify karega super fast speed ke liye
        });
    </script>

</body>
</html>
